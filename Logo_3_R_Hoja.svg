<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A66B72"/>
      <stop offset="100%" style="stop-color:#C4878E"/>
    </linearGradient>
  </defs>
  <!-- Stylized R with leaf growing from it -->
  <g transform="translate(70, 100)">
    <!-- The letter R as a bold elegant shape -->
    <text x="-28" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#A66B72" text-anchor="start">R</text>
    <!-- Leaf sprouting from top-right of R -->
    <g transform="translate(18, -28)">
      <!-- Stem -->
      <path d="M0,0 C4,-8 8,-16 6,-26" stroke="#7BA56E" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Leaf 1 -->
      <path d="M6,-26 C12,-30 14,-20 6,-18 C-2,-20 0,-30 6,-26Z" fill="#7BA56E" opacity="0.9"/>
      <!-- Small leaf -->
      <path d="M2,-12 C6,-16 10,-12 4,-8 C0,-10 -2,-14 2,-12Z" fill="#7BA56E" opacity="0.7"/>
    </g>
    <!-- Small golden circle accent -->
    <circle cx="30" cy="22" r="4" fill="#C9A96E" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="130" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#4A3035" letter-spacing="6">RONDA</text>
  <text x="130" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#C9A96E" font-style="italic" letter-spacing="1">Creces tu, crecemos todas</text>
</svg>