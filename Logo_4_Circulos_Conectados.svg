<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="roseGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A66B72"/>
      <stop offset="100%" style="stop-color:#C4878E"/>
    </linearGradient>
  </defs>
  <!-- Abstract overlapping circles representing connection & community -->
  <g transform="translate(70, 100)">
    <!-- Circle 1 - top -->
    <circle cx="0" cy="-18" r="22" fill="none" stroke="#C4878E" stroke-width="2.5" opacity="0.8"/>
    <!-- Circle 2 - bottom left -->
    <circle cx="-16" cy="10" r="22" fill="none" stroke="#A66B72" stroke-width="2.5" opacity="0.8"/>
    <!-- Circle 3 - bottom right -->
    <circle cx="16" cy="10" r="22" fill="none" stroke="#C9A96E" stroke-width="2.5" opacity="0.8"/>
    <!-- Filled intersection area (center where all 3 meet) -->
    <clipPath id="clip1">
      <circle cx="0" cy="-18" r="22"/>
    </clipPath>
    <clipPath id="clip2">
      <circle cx="-16" cy="10" r="22"/>
    </clipPath>
    <!-- Center glow -->
    <circle cx="0" cy="0" r="8" fill="#C4878E" opacity="0.2"/>
    <circle cx="0" cy="0" r="4" fill="#C9A96E" opacity="0.5"/>
    <!-- Small leaf accent in center -->
    <path d="M0,-3 C2,-5 4,-3 0,2 C-4,-3 -2,-5 0,-3Z" fill="#7BA56E" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="130" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#4A3035" letter-spacing="6">RONDA</text>
  <text x="130" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#C9A96E" font-style="italic" letter-spacing="1">Creces tu, crecemos todas</text>
</svg>