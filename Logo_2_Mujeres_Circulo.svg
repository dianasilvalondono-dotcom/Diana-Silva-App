<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="roseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A66B72"/>
      <stop offset="100%" style="stop-color:#C4878E"/>
    </linearGradient>
  </defs>
  <!-- Three women silhouettes forming a circle / ronda -->
  <g transform="translate(70, 100)">
    <!-- Woman 1 - top -->
    <g transform="rotate(-90)">
      <circle cx="28" cy="0" r="7" fill="#C4878E"/>
      <path d="M28,8 C22,12 20,22 22,28 C24,24 32,24 34,28 C36,22 34,12 28,8Z" fill="#C4878E" opacity="0.85"/>
      <!-- reaching arm -->
      <path d="M22,18 Q12,14 8,20" stroke="#C4878E" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Woman 2 - bottom right -->
    <g transform="rotate(30)">
      <circle cx="28" cy="0" r="7" fill="#A66B72"/>
      <path d="M28,8 C22,12 20,22 22,28 C24,24 32,24 34,28 C36,22 34,12 28,8Z" fill="#A66B72" opacity="0.85"/>
      <path d="M22,18 Q12,14 8,20" stroke="#A66B72" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Woman 3 - bottom left -->
    <g transform="rotate(150)">
      <circle cx="28" cy="0" r="7" fill="#C9A96E"/>
      <path d="M28,8 C22,12 20,22 22,28 C24,24 32,24 34,28 C36,22 34,12 28,8Z" fill="#C9A96E" opacity="0.85"/>
      <path d="M22,18 Q12,14 8,20" stroke="#C9A96E" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Connecting circle (invisible bond) -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#DDB3B7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <!-- Center heart/leaf -->
    <path d="M0,-5 C3,-8 6,-5 0,2 C-6,-5 -3,-8 0,-5Z" fill="#C9A96E" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="130" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#4A3035" letter-spacing="6">RONDA</text>
  <text x="130" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#C9A96E" font-style="italic" letter-spacing="1">Creces tu, crecemos todas</text>
</svg>